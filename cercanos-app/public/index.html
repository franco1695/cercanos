<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cercanos — Lima</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f2b3d; --bg2:#153a52; --panel:#1b4560;
    --accent:#ff8a65; --accent2:#ffd166; --text:#f4f6f5; --muted:#9fb7c4;
    --line:rgba(255,255,255,0.10); --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100%;}
  body{ background: radial-gradient(ellipse at 50% -10%, #1e5674 0%, transparent 55%), linear-gradient(180deg,#0f2b3d 0%, #0a1f2c 100%); }
  h1,h2,h3{font-family:'Fraunces',serif; margin:0;}
  button{font-family:inherit; cursor:pointer;}
  .wrap{max-width:960px; margin:0 auto; padding:0 18px 60px;}
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:20px 18px; max-width:960px; margin:0 auto; }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-mark{ width:34px;height:34px;border-radius:50%; background:conic-gradient(from 200deg, var(--accent), var(--accent2), var(--accent)); flex-shrink:0; }
  .brand h1{font-size:22px; font-weight:700;}
  .brand span{display:block; font-size:11px; color:var(--muted); font-weight:500; letter-spacing:1px; text-transform:uppercase;}
  .nav-btn{ background:transparent; border:1px solid var(--line); color:var(--text); padding:8px 16px; border-radius:30px; font-size:13px; font-weight:600; }
  .nav-btn.active{ background:var(--accent); border-color:var(--accent); color:#1a1006; }
  .wave{ display:block; width:100%; height:46px; margin-top:-4px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:22px; }
  .hero{ text-align:center; padding:10px 10px 26px; }
  .hero h2{ font-size:32px; line-height:1.15; }
  .hero p{ color:var(--muted); font-size:14.5px; margin-top:10px; max-width:440px; margin-left:auto; margin-right:auto; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12.5px; color:var(--muted); font-weight:600; margin-bottom:6px; letter-spacing:0.3px; text-transform:uppercase; }
  .field input, .field select, .field textarea{
    width:100%; background:#102b3d; border:1px solid var(--line); color:var(--text);
    padding:11px 13px; border-radius:10px; font-size:14.5px; font-family:inherit;
  }
  .field textarea{ resize:vertical; min-height:70px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .photo-picker{ display:flex; align-items:center; gap:16px; margin-bottom:18px; }
  .photo-preview{ width:84px; height:84px; border-radius:50%; background:#0d2635; border:2px dashed var(--line); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; color:var(--muted); font-size:11px; text-align:center; }
  .photo-preview img{ width:100%; height:100%; object-fit:cover; }
  .btn-upload{ background:transparent; border:1px solid var(--accent); color:var(--accent); padding:9px 16px; border-radius:30px; font-size:13px; font-weight:700; }
  .btn-primary{ width:100%; background:linear-gradient(90deg,var(--accent),#ff6f47); border:none; color:#1a0e06; font-weight:800; padding:14px; border-radius:30px; font-size:15px; margin-top:6px; }
  .btn-primary:disabled{ opacity:0.5; }
  .btn-secondary{ width:100%; background:transparent; border:1px solid var(--line); color:var(--text); font-weight:700; padding:12px; border-radius:30px; font-size:14px; margin-top:10px; }
  .error-msg{ color:#ffb4a8; font-size:12.5px; margin-top:8px; min-height:16px; }
  .toggle-auth{ text-align:center; margin-top:16px; font-size:13px; color:var(--muted); }
  .toggle-auth a{ color:var(--accent2); font-weight:700; cursor:pointer; text-decoration:none; }
  .filter-row{ display:flex; gap:10px; align-items:center; margin:22px 0 18px; flex-wrap:wrap; justify-content:space-between; }
  .filter-row select{ background:#102b3d; color:var(--text); border:1px solid var(--line); border-radius:30px; padding:9px 16px; font-size:13.5px; }
  .count-tag{ font-size:12.5px; color:var(--muted); }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(210px,1fr)); gap:16px; }
  .profile-card{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; display:flex; flex-direction:column; transition:transform .15s; }
  .profile-card:hover{ transform:translateY(-3px); }
  .profile-photo{ width:100%; aspect-ratio:1/1; background:#0d2635; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .profile-photo img{ width:100%; height:100%; object-fit:cover; }
  .profile-initial{ font-family:'Fraunces',serif; font-size:44px; color:var(--muted); }
  .profile-info{ padding:14px; }
  .profile-name{ font-size:16px; font-weight:700; display:flex; align-items:baseline; gap:6px; }
  .profile-age{ color:var(--muted); font-weight:500; font-size:13.5px; }
  .district-pill{ display:inline-block; margin-top:6px; font-size:11px; font-weight:700; letter-spacing:0.3px; background:rgba(255,138,101,0.15); color:var(--accent); padding:3px 10px; border-radius:20px; }
  .profile-bio{ font-size:12.5px; color:var(--muted); margin-top:8px; line-height:1.4; height:34px; overflow:hidden; }
  .card-actions{ display:flex; gap:8px; margin:0 14px 14px; }
  .btn-write{ flex:1; background:transparent; border:1px solid var(--accent2); color:var(--accent2); padding:8px; border-radius:20px; font-size:12.5px; font-weight:700; }
  .btn-more{ width:36px; background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:20px; font-size:14px; }
  .empty-state{ text-align:center; padding:50px 20px; color:var(--muted); }
  .chat-header{ display:flex; align-items:center; gap:12px; padding-bottom:16px; border-bottom:1px solid var(--line); margin-bottom:16px; }
  .back-btn{ background:transparent; border:none; color:var(--muted); font-size:20px; padding:4px 8px; }
  .chat-photo{ width:44px; height:44px; border-radius:50%; overflow:hidden; background:#0d2635; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .chat-photo img{ width:100%; height:100%; object-fit:cover; }
  .chat-messages{ display:flex; flex-direction:column; gap:10px; min-height:280px; max-height:50vh; overflow-y:auto; padding:6px 2px 14px; }
  .msg{ max-width:75%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.4; }
  .msg.me{ align-self:flex-end; background:linear-gradient(90deg,var(--accent),#ff6f47); color:#1a0e06; font-weight:600; border-bottom-right-radius:4px; }
  .msg.them{ align-self:flex-start; background:#10344a; border:1px solid var(--line); border-bottom-left-radius:4px; }
  .msg-time{ display:block; font-size:10px; opacity:0.65; margin-top:4px; font-weight:500; }
  .chat-input-row{ display:flex; gap:10px; margin-top:6px; }
  .chat-input-row input{ flex:1; background:#102b3d; border:1px solid var(--line); color:var(--text); padding:12px 15px; border-radius:30px; font-size:14px; }
  .send-btn{ background:var(--accent); border:none; color:#1a0e06; font-weight:800; padding:0 22px; border-radius:30px; font-size:14px; }
  .safety-note{ font-size:11.5px; color:var(--muted); text-align:center; margin-top:14px; }
  .msgs-tab-item{ display:flex; gap:12px; align-items:center; padding:12px; border-radius:12px; cursor:pointer; }
  .msgs-tab-item:hover{ background:rgba(255,255,255,0.04); }
  .msgs-tab-item .name{ font-weight:700; font-size:14.5px; }
  .msgs-tab-item .preview{ font-size:12.5px; color:var(--muted); margin-top:2px; }
  .menu-popover{ position:absolute; background:#0d2635; border:1px solid var(--line); border-radius:10px; padding:6px; z-index:10; box-shadow:0 8px 24px rgba(0,0,0,0.4); }
  .menu-popover button{ display:block; width:100%; text-align:left; background:transparent; border:none; color:var(--text); padding:8px 12px; font-size:13px; border-radius:6px; }
  .menu-popover button:hover{ background:rgba(255,255,255,0.06); }
  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:10px; }

  /* Swipe deck (estilo Tinder) */
  .deck-wrap{ display:flex; flex-direction:column; align-items:center; padding:10px 0 20px; }
  .deck{ position:relative; width:100%; max-width:340px; height:480px; }
  .swipe-card{
    position:absolute; inset:0; background:var(--panel); border:1px solid var(--line); border-radius:22px;
    overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.35); display:flex; flex-direction:column;
    touch-action:none; cursor:grab; will-change:transform;
  }
  .swipe-card.top{ z-index:3; }
  .swipe-photo{ flex:1; background:#0d2635; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
  .swipe-photo img{ width:100%; height:100%; object-fit:cover; pointer-events:none; }
  .swipe-photo .profile-initial{ font-size:80px; }
  .swipe-badge{ position:absolute; top:22px; padding:8px 16px; border:4px solid; border-radius:10px; font-family:'Fraunces',serif; font-weight:700; font-size:24px; opacity:0; transform:rotate(-15deg); text-transform:uppercase; }
  .swipe-badge.like{ left:20px; color:#7ee1ff; border-color:#7ee1ff; }
  .swipe-badge.pass{ right:20px; color:#ff8a65; border-color:#ff8a65; transform:rotate(15deg); }
  .swipe-info{ padding:16px 18px 18px; background:linear-gradient(0deg, rgba(0,0,0,0.55), transparent 90%); margin-top:-70px; position:relative; z-index:2; }
  .swipe-name{ font-size:22px; font-weight:700; display:flex; align-items:baseline; gap:8px; }
  .swipe-age{ font-size:16px; color:var(--muted); font-weight:600; }
  .swipe-tags{ margin-top:6px; display:flex; gap:6px; flex-wrap:wrap; }
  .swipe-bio{ font-size:13px; color:var(--muted); margin-top:8px; line-height:1.4; }
  .deck-actions{ display:flex; gap:22px; margin-top:22px; }
  .deck-btn{ width:60px; height:60px; border-radius:50%; border:none; font-size:24px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px rgba(0,0,0,0.3); }
  .deck-btn.pass{ background:#241a17; color:#ff8a65; border:2px solid #ff8a65; }
  .deck-btn.like{ background:#0f2733; color:#7ee1ff; border:2px solid #7ee1ff; }
  .deck-btn.chat{ width:48px; height:48px; background:var(--accent2); color:#1a1006; font-size:18px; align-self:center; }

  /* Overlay de llamada */
  .call-overlay{ position:fixed; inset:0; background:#05141c; z-index:50; display:flex; flex-direction:column; }
  .call-remote{ flex:1; background:#0a1f2c; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
  .call-remote video{ width:100%; height:100%; object-fit:cover; }
  .call-remote-placeholder{ text-align:center; }
  .call-remote-placeholder .profile-initial{ font-size:70px; }
  .call-local{ position:absolute; bottom:110px; right:16px; width:110px; height:150px; border-radius:14px; overflow:hidden; border:2px solid var(--line); background:#000; }
  .call-local video{ width:100%; height:100%; object-fit:cover; }
  .call-status{ position:absolute; top:26px; left:0; right:0; text-align:center; color:#fff; font-size:15px; font-weight:600; }
  .call-controls{ padding:20px; display:flex; gap:20px; justify-content:center; align-items:center; }
  .call-control-btn{ width:56px; height:56px; border-radius:50%; border:none; font-size:22px; display:flex; align-items:center; justify-content:center; }
  .call-control-btn.end{ background:#e34848; color:#fff; width:66px; height:66px; font-size:26px; }
  .call-control-btn.toggle{ background:rgba(255,255,255,0.12); color:#fff; }
  .call-control-btn.toggle.off{ background:rgba(227,72,72,0.5); }
  .incoming-call-card{ text-align:center; }
  .incoming-call-photo{ width:100px; height:100px; border-radius:50%; overflow:hidden; margin:0 auto 14px; background:#0d2635; display:flex; align-items:center; justify-content:center; border:2px solid var(--line); }
  .incoming-call-photo img{ width:100%; height:100%; object-fit:cover; }
  .call-btn-header{ background:transparent; border:1px solid var(--accent2); color:var(--accent2); border-radius:20px; padding:7px 14px; font-size:12.5px; font-weight:700; }
  .call-btn-header:disabled{ opacity:0.35; border-color:var(--muted); color:var(--muted); }
</style>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="brand-mark"></div>
    <div><h1>Cercanos</h1><span>Conoce gente cerca · Lima</span></div>
  </div>
  <div id="navArea" style="display:flex; gap:8px;"></div>
</div>
<svg class="wave" viewBox="0 0 1200 60" preserveAspectRatio="none"><path d="M0,30 C 200,60 400,0 600,30 C 800,60 1000,0 1200,30 L1200,60 L0,60 Z" fill="#153a52"/></svg>
<div class="wrap" id="app"></div>

<script>
(function(){
  const DISTRITOS = ["Miraflores","San Isidro","Barranco","Surco","San Borja","La Molina",
    "Jesús María","Lince","Magdalena","Pueblo Libre","San Miguel","Chorrillos",
    "Comas","Los Olivos","San Juan de Lurigancho","Ate","La Victoria","Rímac",
    "Callao","Villa El Salvador","Surquillo","Breña"];
  const GENEROS = ["Hombre","Mujer","Otro"];
  const INTERESES = ["Hombres","Mujeres","Todos"];

  let token = localStorage.getItem('cercanos_token') || null;
  let me = null;
  let screen = 'loading'; // loading | login | register | browse | messages | chat
  let authMode = 'login';
  let profiles = [];
  let districtFilter = 'todos';
  let genderFilter = 'todos';
  let deckIndex = 0;
  let activeChat = null;
  let chatMessages = [];
  let pendingPhotoFile = null;
  let pollTimer = null;
  let chatCanCall = false;
  let socket = null;
  let peerConnection = null;
  let localStream = null;
  let callPartner = null;
  let callState = 'idle'; // idle | calling | active
  const ICE_SERVERS = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

  const app = document.getElementById('app');
  const navArea = document.getElementById('navArea');

  function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function initials(name){ return (name||'?').trim().charAt(0).toUpperCase(); }
  function timeStr(ts){ const d=new Date(ts); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }

  async function api(path, opts={}){
    const headers = opts.headers || {};
    if(!(opts.body instanceof FormData)) headers['Content-Type'] = 'application/json';
    if(token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch('/api'+path, { ...opts, headers });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || 'Ocurrió un error inesperado.');
    return data;
  }

  async function init(){
    const params = new URLSearchParams(window.location.search);
    const fbToken = params.get('fbToken');
    const fbError = params.get('fbError');
    if(fbToken){
      token = fbToken;
      localStorage.setItem('cercanos_token', token);
      window.history.replaceState({}, '', window.location.pathname);
    }
    if(fbError){
      window.history.replaceState({}, '', window.location.pathname);
    }

    if(token){
      try{
        const data = await api('/profiles/me');
        me = data.profile;
        if(me.needsProfile){
          screen = 'completeProfile';
          render();
          return;
        }
        screen = 'browse';
        await loadProfiles();
        startPolling();
        render();
        return;
      }catch(e){
        token = null; localStorage.removeItem('cercanos_token');
      }
    }
    screen = 'login';
    if(fbError) setTimeout(()=>{ const err = document.getElementById('errMsg'); if(err) err.textContent = 'No se pudo completar el login con Facebook. Intenta de nuevo.'; }, 0);
    render();
  }

  function startPolling(){
    connectSocket();
    if(pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async ()=>{
      if(screen==='chat' && activeChat){ await refreshChat(); }
      else if(screen==='messages'){ render(); }
    }, 4000);
  }

  async function loadProfiles(){
    try{
      const qs = new URLSearchParams();
      if(districtFilter!=='todos') qs.set('district', districtFilter);
      if(genderFilter!=='todos') qs.set('gender', genderFilter);
      const q = qs.toString() ? ('?'+qs.toString()) : '';
      const data = await api('/profiles'+q);
      profiles = data.profiles;
      deckIndex = 0;
    }catch(e){ profiles = []; }
  }

  function resizePhoto(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          const maxSize = 320;
          let w = img.width, h = img.height;
          if(w>h){ if(w>maxSize){ h = h*maxSize/w; w=maxSize; } }
          else { if(h>maxSize){ w = w*maxSize/h; h=maxSize; } }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          canvas.toBlob(blob=>resolve(blob), 'image/jpeg', 0.8);
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---------- RENDER ----------
  function render(){
    renderNav();
    if(screen==='loading'){ app.innerHTML=''; return; }
    if(screen==='login' || screen==='register') return renderAuth();
    if(screen==='completeProfile') return renderCompleteProfile();
    if(screen==='browse') return renderBrowse();
    if(screen==='messages') return renderMessagesTab();
    if(screen==='chat') return renderChat();
  }

  function renderNav(){
    if(!me){ navArea.innerHTML=''; return; }
    navArea.innerHTML = `
      <button class="nav-btn ${screen==='browse'?'active':''}" id="navBrowse">Explorar</button>
      <button class="nav-btn ${screen==='messages'?'active':''}" id="navMsgs">Mensajes</button>
      <button class="nav-btn" id="navLogout">Salir</button>
    `;
    document.getElementById('navBrowse').onclick = async ()=>{ screen='browse'; await loadProfiles(); render(); };
    document.getElementById('navMsgs').onclick = ()=>{ screen='messages'; render(); };
    document.getElementById('navLogout').onclick = ()=>{
      token=null; me=null; localStorage.removeItem('cercanos_token');
      screen='login'; render();
    };
  }

  function renderAuth(){
    const isLogin = screen==='login';
    app.innerHTML = `
      <div class="hero">
        <h2>Gente real, cerca de ti.</h2>
        <p>Crea tu cuenta, sube tu foto y empieza a escribir directamente — sin esperar un "match".</p>
      </div>
      <div class="card">
        ${!isLogin ? `
        <div class="photo-picker">
          <div class="photo-preview" id="photoPreview">Sin foto</div>
          <div>
            <input type="file" accept="image/*" id="photoInput" style="display:none">
            <button class="btn-upload" id="uploadBtn" type="button">Subir foto</button>
          </div>
        </div>
        <div class="field"><label>Nombre</label><input type="text" id="fName" maxlength="30" placeholder="¿Cómo te llamas?"></div>
        <div class="row2">
          <div class="field"><label>Edad</label><input type="number" id="fAge" min="18" max="99" placeholder="18+"></div>
          <div class="field"><label>Distrito</label>
            <select id="fDistrict"><option value="">Selecciona</option>${DISTRITOS.map(d=>`<option value="${d}">${d}</option>`).join('')}</select>
          </div>
        </div>
        <div class="row2">
          <div class="field"><label>Género</label>
            <select id="fGender"><option value="">Selecciona</option>${GENEROS.map(g=>`<option value="${g}">${g}</option>`).join('')}</select>
          </div>
          <div class="field"><label>Me interesa ver</label>
            <select id="fInterested">${INTERESES.map(g=>`<option value="${g}" ${g==='Todos'?'selected':''}>${g}</option>`).join('')}</select>
          </div>
        </div>
        <div class="field"><label>Sobre ti</label><textarea id="fBio" maxlength="140" placeholder="Cuéntale algo a la gente de tu zona..."></textarea></div>
        ` : ''}
        <div class="field"><label>Email</label><input type="text" id="fEmail" placeholder="tucorreo@ejemplo.com"></div>
        <div class="field"><label>Contraseña</label><input type="password" id="fPassword" placeholder="Mínimo 6 caracteres"></div>
        <button class="btn-primary" id="submitBtn">${isLogin ? 'Ingresar' : 'Crear mi cuenta'}</button>
        <div class="error-msg" id="errMsg"></div>
        <button class="btn-secondary" id="fbBtn">Continuar con Facebook</button>
        <div class="toggle-auth">
          ${isLogin ? '¿No tienes cuenta? <a id="toggleLink">Regístrate</a>' : '¿Ya tienes cuenta? <a id="toggleLink">Ingresa</a>'}
        </div>
      </div>
    `;
    document.getElementById('toggleLink').onclick = ()=>{ screen = isLogin ? 'register' : 'login'; render(); };
    document.getElementById('fbBtn').onclick = ()=>{ window.location.href = '/api/auth/facebook'; };
    if(!isLogin){
      document.getElementById('uploadBtn').onclick = ()=> document.getElementById('photoInput').click();
      document.getElementById('photoInput').onchange = async (e)=>{
        const file = e.target.files[0];
        if(!file) return;
        pendingPhotoFile = file;
        const reader = new FileReader();
        reader.onload = ()=>{ document.getElementById('photoPreview').innerHTML = `<img src="${reader.result}">`; };
        reader.readAsDataURL(file);
      };
    }
    document.getElementById('submitBtn').onclick = isLogin ? handleLogin : handleRegister;
  }

  async function handleLogin(){
    const email = document.getElementById('fEmail').value.trim();
    const password = document.getElementById('fPassword').value;
    const errEl = document.getElementById('errMsg');
    errEl.textContent = '';
    try{
      const data = await api('/auth/login', { method:'POST', body: JSON.stringify({ email, password }) });
      token = data.token; me = data.profile;
      localStorage.setItem('cercanos_token', token);
      screen = 'browse';
      await loadProfiles();
      startPolling();
      render();
    }catch(e){ errEl.textContent = e.message; }
  }

  async function handleRegister(){
    const name = document.getElementById('fName').value.trim();
    const age = document.getElementById('fAge').value;
    const district = document.getElementById('fDistrict').value;
    const gender = document.getElementById('fGender').value;
    const interestedIn = document.getElementById('fInterested').value;
    const bio = document.getElementById('fBio').value.trim();
    const email = document.getElementById('fEmail').value.trim();
    const password = document.getElementById('fPassword').value;
    const errEl = document.getElementById('errMsg');
    errEl.textContent = '';
    try{
      const data = await api('/auth/register', { method:'POST', body: JSON.stringify({ name, age, district, gender, interestedIn, bio, email, password }) });
      token = data.token; me = data.profile;
      localStorage.setItem('cercanos_token', token);
      if(pendingPhotoFile){
        const blob = await resizePhoto(pendingPhotoFile);
        const fd = new FormData();
        fd.append('photo', blob, 'photo.jpg');
        const up = await api('/profiles/me/photo', { method:'POST', body: fd });
        me = up.profile;
      }
      screen = 'browse';
      await loadProfiles();
      startPolling();
      render();
    }catch(e){ errEl.textContent = e.message; }
  }

  function renderBrowse(){
    app.innerHTML = `
      <div class="filter-row">
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <select id="districtFilter">
            <option value="todos">Todos los distritos</option>
            ${DISTRITOS.map(d=>`<option value="${d}" ${districtFilter===d?'selected':''}>${d}</option>`).join('')}
          </select>
          <select id="genderFilter">
            <option value="todos" ${genderFilter==='todos'?'selected':''}>Todos los géneros</option>
            ${GENEROS.map(g=>`<option value="${g}" ${genderFilter===g?'selected':''}>${g}</option>`).join('')}
          </select>
        </div>
        <span class="count-tag">${profiles.length} persona${profiles.length===1?'':'s'} cerca de ti</span>
      </div>
      <div class="deck-wrap">
        <div class="deck" id="deck"></div>
        <div class="deck-actions" id="deckActions">
          <button class="deck-btn pass" id="passBtn" title="Pasar">✕</button>

      </div>
    `;
    document.getElementById('districtFilter').onchange = async (e)=>{ districtFilter = e.target.value; await loadProfiles(); renderBrowse(); };
    document.getElementById('genderFilter').onchange = async (e)=>{ genderFilter = e.target.value; await loadProfiles(); renderBrowse(); };
    renderDeck();
  }

  function renderDeck(){
    const deckEl = document.getElementById('deck');
    const actionsEl = document.getElementById('deckActions');
    if(!deckEl) return;
    const remaining = profiles.slice(deckIndex, deckIndex + 2);

    if(remaining.length === 0){
      deckEl.innerHTML = `<div class="empty-state" style="padding-top:70px;">Ya viste a todos por aquí.<br>Prueba otro distrito o género, o vuelve más tarde.</div>`;
      actionsEl.style.display = 'none';
      return;
    }
    actionsEl.style.display = 'flex';

    deckEl.innerHTML = remaining.map((p, i)=>{
      const isTop = i===0;
      return `
        <div class="swipe-card ${isTop?'top':''}" data-id="${p.id}" ${isTop?'':'style="transform:scale(0.96) translateY(10px); opacity:0.6;"'}>
          <div class="swipe-photo">
            ${p.photo ? `<img src="${p.photo}">` : `<span class="profile-initial">${initials(p.name)}</span>`}
            <div class="swipe-badge like">Me gusta</div>
            <div class="swipe-badge pass">Paso</div>
            ${isTop ? `<button class="btn-more" data-more="${p.id}" style="position:absolute; top:14px; right:14px; background:rgba(0,0,0,0.45); border:none; color:#fff;">⋯</button>` : ''}
          </div>
          <div class="swipe-info">
            <div class="swipe-name">${escapeHtml(p.name)} <span class="swipe-age">${p.age}</span></div>
            <div class="swipe-tags">
              <span class="district-pill">${escapeHtml(p.district)}</span>
              ${p.gender ? `<span class="district-pill" style="background:rgba(126,225,255,0.15); color:#7ee1ff;">${escapeHtml(p.gender)}</span>` : ''}
            </div>
            <div class="swipe-bio">${escapeHtml(p.bio||'')}</div>
          </div>
        </div>
      `;
    }).join('');

    const topCardEl = deckEl.querySelector('.swipe-card.top');
    if(topCardEl) attachSwipeHandlers(topCardEl);

    const moreBtn = deckEl.querySelector('.btn-more');
    if(moreBtn) moreBtn.onclick = (e)=>{ e.stopPropagation(); showMoreMenu(e, moreBtn.dataset.more); };

    document.getElementById('quickChatBtn').onclick = ()=> openChat(remaining[0]);
    document.getElementById('passBtn').onclick = ()=> doSwipe('left');
    document.getElementById('likeBtn').onclick = ()=> doSwipe('right');
  }

  function attachSwipeHandlers(el){
    let startX=0, startY=0, dx=0, dy=0;
    const likeBadge = el.querySelector('.swipe-badge.like');
    const passBadge = el.querySelector('.swipe-badge.pass');
    el.addEventListener('pointerdown', (e)=>{
      el.setPointerCapture(e.pointerId);
      startX = e.clientX; startY = e.clientY;
      el.style.transition = 'none';
    });
    el.addEventListener('pointermove', (e)=>{
      if(e.buttons !== 1) return;
      dx = e.clientX - startX; dy = e.clientY - startY;
      el.style.transform = `translate(${dx}px, ${dy}px) rotate(${dx/15}deg)`;
      const opacity = Math.min(Math.abs(dx)/100, 1);
      likeBadge.style.opacity = dx>0 ? opacity : 0;
      passBadge.style.opacity = dx<0 ? opacity : 0;
    });
    el.addEventListener('pointerup', ()=>{
      el.style.transition = 'transform 0.3s ease';
      if(dx > 100) doSwipe('right');
      else if(dx < -100) doSwipe('left');
      else { el.style.transform=''; likeBadge.style.opacity=0; passBadge.style.opacity=0; }
      dx = 0; dy = 0;
    });
  }

  function doSwipe(direction){
    const el = document.querySelector('.swipe-card.top');
    if(!el) return;
    const flyX = direction==='right' ? window.innerWidth : -window.innerWidth;
    el.style.transition = 'transform 0.35s ease';
    el.style.transform = `translate(${flyX}px, -30px) rotate(${direction==='right'?30:-30}deg)`;
    setTimeout(()=>{ deckIndex++; renderDeck(); }, 260);
  }

  function showMoreMenu(e, userId){
    document.querySelectorAll('.menu-popover').forEach(m=>m.remove());
    const rect = e.target.getBoundingClientRect();
    const menu = document.createElement('div');
    menu.className = 'menu-popover';
    menu.style.top = (rect.bottom + window.scrollY + 4) + 'px';
    menu.style.left = (rect.left + window.scrollX - 100) + 'px';
    menu.innerHTML = `<button id="mReport">Reportar</button><button id="mBlock">Bloquear</button>`;
    document.body.appendChild(menu);
    document.getElementById('mReport').onclick = async ()=>{
      const reason = prompt('¿Por qué quieres reportar a esta persona?');
      if(reason && reason.trim()){
        try{ await api('/report', { method:'POST', body: JSON.stringify({ reportedId: userId, reason }) }); alert('Gracias, revisaremos tu reporte.'); }
        catch(err){ alert(err.message); }
      }
      menu.remove();
    };
    document.getElementById('mBlock').onclick = async ()=>{
      if(confirm('¿Bloquear a esta persona? Ya no podrán verse ni escribirse.')){
        try{ await api('/block', { method:'POST', body: JSON.stringify({ blockedId: userId }) }); await loadProfiles(); renderBrowse(); }
        catch(err){ alert(err.message); }
      }
      menu.remove();
    };
    setTimeout(()=>{ document.addEventListener('click', function h(ev){ if(!menu.contains(ev.target)){ menu.remove(); document.removeEventListener('click', h); } }); }, 0);
  }

  async function renderMessagesTab(){
    app.innerHTML = `<div class="card"><h3 style="margin-bottom:14px;">Tus conversaciones</h3><div id="msgsList">Cargando...</div></div>`;
    try{
      const data = await api('/chat');
      const listEl = document.getElementById('msgsList');
      if(data.conversations.length===0){
        listEl.innerHTML = `<div class="empty-state">Aún no tienes conversaciones.<br>Ve a "Explorar" y escríbele a alguien.</div>`;
        return;
      }
      listEl.innerHTML = data.conversations.map(c=>`
        <div class="msgs-tab-item" data-id="${c.profile.id}">
          <div class="chat-photo">${c.profile.photo?`<img src="${c.profile.photo}">`:`<span class="profile-initial" style="font-size:18px;">${initials(c.profile.name)}</span>`}</div>
          <div>
            <div class="name">${escapeHtml(c.profile.name)} · ${escapeHtml(c.profile.district)}</div>
            <div class="preview">${c.lastMessage.mine ? 'Tú: ' : ''}${escapeHtml(c.lastMessage.text).slice(0,50)}</div>
          </div>
        </div>
      `).join('');
      listEl.querySelectorAll('.msgs-tab-item').forEach(row=>{
        row.onclick = ()=>{ const c = data.conversations.find(x=>x.profile.id===row.dataset.id); openChat(c.profile); };
      });

      document.getElementById('msgsList').innerHTML = 'No se pudieron cargar tus conversaciones.';
    }

  async function openChat(profile){
    activeChat = profile;
    screen = 'chat';
    await refreshChat();
    render();
  }

  async function refreshChat(){
    try{
      const data = await api('/chat/'+activeChat.id);
      chatMessages = data.messages;
      chatCanCall = !!data.canCall;
      if(screen==='chat'){ renderChatMessages(); updateCallButton(); }
    }catch(e){}
  }

  function updateCallButton(){
    const btn = document.getElementById('callBtn');
    if(!btn) return;
    btn.disabled = !chatCanCall;
    btn.title = chatCanCall ? 'Iniciar videollamada' : 'Escríbanse al menos 3 mensajes cada uno para desbloquear la llamada';
  }

  function renderChat(){
    app.innerHTML = `
      <div class="card">
        <div class="chat-header">
          <button class="back-btn" id="backBtn">←</button>
          <div class="chat-photo">${activeChat.photo?`<img src="${activeChat.photo}">`:`<span class="profile-initial" style="font-size:18px;">${initials(activeChat.name)}</span>`}</div>
          <div style="flex:1;">
            <div style="font-weight:700;">${escapeHtml(activeChat.name)}</div>
            <div style="font-size:12px; color:var(--muted);">${escapeHtml(activeChat.district)}</div>
          </div>
          <button class="call-btn-header" id="callBtn" ${chatCanCall?'':'disabled'} title="${chatCanCall?'Iniciar videollamada':'Escríbanse al menos 3 mensajes cada uno para desbloquear la llamada'}">📞 Llamar</button>
          <button class="btn-more" id="chatMore">⋯</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <input type="text" id="msgInput" placeholder="Escribe un mensaje..." maxlength="500">
          <button class="send-btn" id="sendBtn">Enviar</button>
        </div>
        <div class="safety-note">Cuida tu privacidad: evita compartir datos sensibles y elige lugares públicos para el primer encuentro.</div>
      </div>
    `;
    document.getElementById('backBtn').onclick = ()=>{ screen='browse'; render(); };
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('chatMore').onclick = (e)=> showMoreMenu(e, activeChat.id);
    document.getElementById('callBtn').onclick = ()=> startCall(activeChat);
    document.getElementById('msgInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') sendMessage(); });
    renderChatMessages();
  }

  function renderChatMessages(){
    const el = document.getElementById('chatMessages');
    if(!el) return;
    if(chatMessages.length===0){
      el.innerHTML = `<div class="empty-state" style="padding:30px 10px;">Todavía no hay mensajes.<br>Sé el primero en escribir 👋</div>`;
      return;
    }
    el.innerHTML = chatMessages.map(m=>`
      <div class="msg ${m.from===me.id?'me':'them'}">${escapeHtml(m.text)}<span class="msg-time">${timeStr(m.ts)}</span></div>
    `).join('');
    el.scrollTop = el.scrollHeight;
  }

  async function sendMessage(){
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    try{
      await api('/chat/'+activeChat.id, { method:'POST', body: JSON.stringify({ text }) });
      await refreshChat();
    }catch(e){ alert(e.message); }
  }

  // ---------- Llamadas (Socket.IO + WebRTC, gratis, sin servidor de pago) ----------
  function connectSocket(){
    if(socket) return;
    socket = io({ auth: { token } });

    socket.on('incoming-call', (data)=> showIncomingCall(data));

    socket.on('call-answered', async (data)=>{
      if(peerConnection){
        try{
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
          callState = 'active';
          setCallStatus('En llamada');
        }catch(e){}
      }
    });

    socket.on('ice-candidate', async (data)=>{
      if(peerConnection && data.candidate){
        try{ await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); }catch(e){}
      }
    });

    socket.on('call-rejected', ()=>{ alert('La persona rechazó la llamada.'); endCall(); });
    socket.on('call-ended', ()=>{ endCall(); });
    socket.on('call-error', (data)=>{ alert(data.message); endCall(); });
  }

  async function startCall(partnerProfile){
    if(!chatCanCall || callState !== 'idle') return;
    try{
      localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    }catch(e){
      alert('No pudimos acceder a tu cámara o micrófono. Revisa los permisos del navegador.');
      return;
    }
    callPartner = { id: partnerProfile.id, name: partnerProfile.name, photo: partnerProfile.photo };
    callState = 'calling';
    showCallOverlay();
    setCallStatus('Llamando a ' + partnerProfile.name + '...');

    peerConnection = new RTCPeerConnection(ICE_SERVERS);
    localStream.getTracks().forEach(t=>peerConnection.addTrack(t, localStream));
    peerConnection.ontrack = (e)=>{ const v = document.getElementById('remoteVideo'); if(v) v.srcObject = e.streams[0]; };
    peerConnection.onicecandidate = (e)=>{ if(e.candidate) socket.emit('ice-candidate', { to: callPartner.id, candidate: e.candidate }); };

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    socket.emit('call-user', { to: callPartner.id, offer });
  }

  function showIncomingCall(data){
    const overlay = document.createElement('div');
    overlay.className = 'call-overlay';
    overlay.id = 'incomingOverlay';
    overlay.innerHTML = `
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div class="incoming-call-card">
          <div class="incoming-call-photo">${data.fromPhoto?`<img src="${data.fromPhoto}">`:`<span class="profile-initial">${initials(data.fromName)}</span>`}</div>
          <h2 style="color:#fff;">${escapeHtml(data.fromName)}</h2>
          <p style="color:var(--muted);">Videollamada entrante...</p>
        </div>
      </div>
      <div class="call-controls">
        <button class="call-control-btn end" id="rejectBtn">✕</button>
        <button class="call-control-btn toggle" id="acceptBtn" style="background:#3ac0ff; color:#031018;">✓</button>
      </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('rejectBtn').onclick = ()=>{
      socket.emit('reject-call', { to: data.from });
      overlay.remove();
    };
    document.getElementById('acceptBtn').onclick = async ()=>{
      overlay.remove();
      await acceptCall(data);
    };
  }

  async function acceptCall(data){
    try{
      localStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:true });
    }catch(e){
      alert('No pudimos acceder a tu cámara o micrófono.');
      socket.emit('reject-call', { to: data.from });
      return;
    }
    callPartner = { id: data.from, name: data.fromName, photo: data.fromPhoto };
    callState = 'active';
    showCallOverlay();
    setCallStatus('En llamada');

    peerConnection = new RTCPeerConnection(ICE_SERVERS);
    localStream.getTracks().forEach(t=>peerConnection.addTrack(t, localStream));
    peerConnection.ontrack = (e)=>{ const v = document.getElementById('remoteVideo'); if(v) v.srcObject = e.streams[0]; };
    peerConnection.onicecandidate = (e)=>{ if(e.candidate) socket.emit('ice-candidate', { to: data.from, candidate: e.candidate }); };

    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit('answer-call', { to: data.from, answer });
  }

  function showCallOverlay(){
    const existing = document.getElementById('activeCallOverlay');
    if(existing) existing.remove();
    const overlay = document.createElement('div');
    overlay.className = 'call-overlay';
    overlay.id = 'activeCallOverlay';
    overlay.innerHTML = `
      <div class="call-remote">
        <video id="remoteVideo" autoplay playsinline></video>
        <div class="call-status" id="callStatusText">Conectando...</div>
      </div>
      <div class="call-local"><video id="localVideo" autoplay playsinline muted></video></div>
      <div class="call-controls">
        <button class="call-control-btn toggle" id="toggleMicBtn">🎤</button>
        <button class="call-control-btn end" id="endCallBtn">✕</button>
        <button class="call-control-btn toggle" id="toggleCamBtn">📷</button>
      </div>
    `;
    document.body.appendChild(overlay);
    const localVideo = document.getElementById('localVideo');
    if(localVideo) localVideo.srcObject = localStream;

    let micOn = true, camOn = true;
    document.getElementById('endCallBtn').onclick = ()=>{
      if(callPartner) socket.emit('end-call', { to: callPartner.id });
      endCall();
    };
    document.getElementById('toggleMicBtn').onclick = (e)=>{
      micOn = !micOn;
      localStream.getAudioTracks().forEach(t=>t.enabled = micOn);
      e.currentTarget.classList.toggle('off', !micOn);
    };
    document.getElementById('toggleCamBtn').onclick = (e)=>{
      camOn = !camOn;
      localStream.getVideoTracks().forEach(t=>t.enabled = camOn);
      e.currentTarget.classList.toggle('off', !camOn);
    };
  }

  function setCallStatus(text){
    const el = document.getElementById('callStatusText');
    if(el) el.textContent = text;
  }

  function endCall(){
    if(peerConnection){ try{ peerConnection.close(); }catch(e){} peerConnection = null; }
    if(localStream){ localStream.getTracks().forEach(t=>t.stop()); localStream = null; }
    callPartner = null;
    callState = 'idle';
    const overlay = document.getElementById('activeCallOverlay');
    if(overlay) overlay.remove();
    const incoming = document.getElementById('incomingOverlay');
    if(incoming) incoming.remove();
  }

  init();
})();
</script>
